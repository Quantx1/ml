name: ML CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      # This repo's root IS the `ml` python package, so it must be checked
      # out into a folder named `ml` and imported from the parent directory.
      - uses: actions/checkout@v4
        with:
          path: ml

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: ml/requirements-train.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r ml/requirements-train.txt
          pip install pytest pytest-asyncio

      - name: Run tests
        run: pytest ml/tests -q
