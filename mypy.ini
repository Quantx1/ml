[mypy]
# The codebase is imported as `backend.*` from the repo root. Without an
# explicit package base, `mypy backend` discovers config.py under BOTH
# `backend.core.config` (treating src/ as a root) and `backend.core.config`
# (repo root), aborting with "Source file found twice under different module
# names". Pin the base to the repo root so there is one canonical module path.
explicit_package_bases = True
namespace_packages = True
ignore_missing_imports = True
mypy_path = .
